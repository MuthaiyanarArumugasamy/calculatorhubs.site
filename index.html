<!DOCTYPE html>
<html>
<head>
    <title>Calculator Hub - Free Online Calculators</title>

    <!-- SEO -->
    <meta name="description" content="Free online calculators - EMI, GST, Age and Currency Converter tools.">
    <meta name="keywords" content="calculator, EMI calculator, GST calculator, age calculator, currency converter">

    <!-- Adsense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2088931413685380"
     crossorigin="anonymous"></script>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            margin: 0;
            text-align: center;
        }

        header {
            background: #1e88e5;
            color: white;
            padding: 15px;
        }

        h1 {
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 800px;
            margin: auto;
            margin-top: 20px;
        }

        .box {
            background: white;
            padding: 20px;
            margin: 15px 0;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        input, select {
            width: 90%;
            padding: 10px;
            margin: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            background: #1e88e5;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #1565c0;
        }

        footer {
            margin-top: 30px;
            padding: 20px;
            background: #eee;
        }

        footer a {
            margin: 0 10px;
            text-decoration: none;
            color: #1e88e5;
        }
    </style>
</head>

<body>

<header>
    <h1>Calculator Hub</h1>
</header>

<div class="container">

    <!-- EMI Calculator -->
    <div class="box">
        <h2>EMI Calculator</h2>
        <input type="number" id="loan" placeholder="Loan Amount">
        <input type="number" id="rate" placeholder="Interest Rate (%)">
        <input type="number" id="months" placeholder="Months">
        <button onclick="calcEMI()">Calculate EMI</button>
        <h3 id="emiResult"></h3>
    </div>

    <!-- GST Calculator -->
    <div class="box">
        <h2>GST Calculator</h2>
        <input type="number" id="gstAmount" placeholder="Amount">
        <input type="number" id="gstRate" placeholder="GST %">
        <button onclick="calcGST()">Calculate GST</button>
        <h3 id="gstResult"></h3>
    </div>

    <!-- Age Calculator -->
    <div class="box">
        <h2>Age Calculator</h2>
        <input type="date" id="dob">
        <button onclick="calcAge()">Calculate Age</button>
        <h3 id="ageResult"></h3>
    </div>

</div>

<footer>
    <a href="about.html">About</a> |
    <a href="privacy.html">Privacy Policy</a> |
    <a href="terms.html">Terms</a> |
    <a href="contact.html">Contact</a>
</footer>

<script>
// EMI
function calcEMI() {
    let P = document.getElementById("loan").value;
    let r = document.getElementById("rate").value / 12 / 100;
    let n = document.getElementById("months").value;

    let emi = (P * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
    document.getElementById("emiResult").innerText = "EMI: ₹" + emi.toFixed(2);
}

// GST
function calcGST() {
    let amount = document.getElementById("gstAmount").value;
    let rate = document.getElementById("gstRate").value;

    let gst = amount * rate / 100;
    document.getElementById("gstResult").innerText = "Total: ₹" + (parseFloat(amount) + gst);
}

// Age
function calcAge() {
    let dob = new Date(document.getElementById("dob").value);
    let today = new Date();

    let age = today.getFullYear() - dob.getFullYear();
    document.getElementById("ageResult").innerText = "Age: " + age + " years";
}
</script>

</body>
</html>
