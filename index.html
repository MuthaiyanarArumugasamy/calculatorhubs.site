<!DOCTYPE html>
<html>
<head>
<title>Calculator Hubs</title>

<meta name="description" content="Free online calculators - currency, BMI, age calculator">

<style>
body {
    font-family: Arial;
    background: #f5f7fa;
    text-align: center;
    margin:0;
}

/* HEADER */
.header {
    background: #4CAF50;
    color: white;
    padding: 20px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
    gap: 15px;
    padding: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

.card:hover {
    background: #e8f5e9;
}

/* CALCULATOR */
.calculator {
    display: none;
    background: white;
    width: 350px;
    margin: 20px auto;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

/* INPUT */
input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
}

/* BUTTON */
button {
    width: 100%;
    padding: 10px;
    background: green;
    color: white;
    border: none;
    margin-top: 10px;
    cursor: pointer;
}

button:hover {
    background: darkgreen;
}

/* FOOTER */
.footer {
    margin-top: 30px;
    padding: 15px;
    background: #eee;
}

.footer a {
    margin: 10px;
    text-decoration: none;
    color: #333;
}
</style>
</head>

<body onload="load()">

<!-- HEADER -->
<div class="header">
<h1>Calculator Hubs</h1>
<p>All-in-one free calculators</p>
</div>

<!-- MENU -->
<div class="grid">
<div class="card" onclick="show('currency')">💱 Currency</div>
<div class="card" onclick="show('bmi')">⚖️ BMI</div>
<div class="card" onclick="show('age')">🎂 Age</div>
</div>

<!-- CURRENCY -->
<div id="currency" class="calculator">
<h2>Currency Converter</h2>

<input type="number" id="amount" value="1">
<select id="from"></select>
<select id="to"></select>

<button onclick="convert()">Convert</button>
<h3 id="result"></h3>

<button onclick="back()">⬅ Back</button>
</div>

<!-- BMI -->
<div id="bmi" class="calculator">
<h2>BMI Calculator</h2>

<input type="number" id="weight" placeholder="Weight (kg)">
<input type="number" id="height" placeholder="Height (cm)">

<button onclick="calcBMI()">Calculate</button>
<h3 id="bmiResult"></h3>

<button onclick="back()">⬅ Back</button>
</div>

<!-- AGE -->
<div id="age" class="calculator">
<h2>Age Calculator</h2>

<input type="date" id="dob">

<button onclick="calcAge()">Calculate</button>
<h3 id="ageResult"></h3>

<button onclick="back()">⬅ Back</button>
</div>

<!-- FOOTER -->
<div class="footer">
<a href="about.html">About</a>
<a href="privacy.html">Privacy</a>
<a href="terms.html">Terms</a>
<a href="contact.html">Contact</a>
</div>

<script>
let rates = {};

async function load() {
let res = await fetch("https://api.exchangerate-api.com/v4/latest/USD");
let data = await res.json();
rates = data.rates;

let from = document.getElementById("from");
let to = document.getElementById("to");

for (let c in rates) {
from.add(new Option(c,c));
to.add(new Option(c,c));
}

from.value="USD";
to.value="INR";
}

// SHOW
function show(id){
document.querySelector('.grid').style.display="none";
document.getElementById(id).style.display="block";
}

// BACK
function back(){
document.querySelector('.grid').style.display="grid";
document.querySelectorAll('.calculator').forEach(c=>c.style.display="none");
}

// CONVERT
function convert(){
let amt = document.getElementById("amount").value;
let from = document.getElementById("from").value;
let to = document.getElementById("to").value;

let rate = rates[to]/rates[from];
let result = amt * rate;

document.getElementById("result").innerText =
amt+" "+from+" = "+result.toFixed(2)+" "+to;
}

// BMI
function calcBMI(){
let w = document.getElementById("weight").value;
let h = document.getElementById("height").value/100;

let b = w/(h*h);
document.getElementById("bmiResult").innerText =
"BMI: "+b.toFixed(2);
}

// AGE
function calcAge(){
let dob = new Date(document.getElementById("dob").value);
let today = new Date();

let age = today.getFullYear() - dob.getFullYear();

document.getElementById("ageResult").innerText =
"Age: "+age+" years";
}
</script>

</body>
</html>
