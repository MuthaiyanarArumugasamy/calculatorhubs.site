<!DOCTYPE html>
<html>
<head>
    <title>Calculator Hubs</title>

<meta name="google-site-verification" content="XtRP8dWNNcBkmDLcIO1_ytufZYWCKEL6qcLK8GnwCdk" />
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2088931413685380"
     crossorigin="anonymous"></script>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            padding-top: 50px;
        }

        .box {
            background: white;
            padding: 20px;
            width: 320px;
            margin: auto;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        h2 {
            background: #00c853;
            padding: 12px;
            border-radius: 6px;
            color: white;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: none;
            background: green;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: darkgreen;
        }

        footer {
            margin-top: 30px;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Currency Converter 🔥🔥🔥</h2>

    <input type="number" id="amount" placeholder="Enter amount">

    <select id="from"></select>
    <select id="to"></select>

    <button onclick="convert()">Convert</button>

    <h3 id="result"></h3>
</div>

<footer>
    <p>© 2026 Calculator Hubs</p>
</footer>

<script>
let rates = {};

// Load currencies
async function loadCurrencies() {
    let res = await fetch("https://api.exchangerate-api.com/v4/latest/USD");
    let data = await res.json();

    rates = data.rates;

    let from = document.getElementById("from");
    let to = document.getElementById("to");

    for (let key in rates) {
        let opt1 = document.createElement("option");
        let opt2 = document.createElement("option");

        opt1.value = key;
        opt1.text = key;

        opt2.value = key;
        opt2.text = key;

        from.appendChild(opt1);
        to.appendChild(opt2);
    }

    from.value = "USD";
    to.value = "INR";
}

// Convert
function convert() {
    let amt = document.getElementById("amount").value;
    let from = document.getElementById("from").value;
    let to = document.getElementById("to").value;

    if (amt === "" || amt <= 0) {
        alert("Enter valid amount");
        return;
    }

    let result = (amt / rates[from]) * rates[to];

    document.getElementById("result").innerText =
        amt + " " + from + " = " + result.toFixed(2) + " " + to;
}

// Load on start
window.onload = function() {
    loadCurrencies();
};
</script>

</body>
</html>
