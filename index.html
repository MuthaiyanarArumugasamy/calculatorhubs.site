<!DOCTYPE html>
<html>
<head>
<title>Calculator Hubs</title>

<style>
body {
    font-family: Arial;
    background: #f5f7fa;
    text-align: center;
}

/* HEADER */
.header {
    background: #4CAF50;
    color: white;
    padding: 20px;
}

/* CALCULATOR LIST */
.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    padding: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

.card:hover {
    background: #e8f5e9;
}

/* CALCULATOR BOX */
.calculator {
    display: none;
    background: white;
    width: 350px;
    margin: auto;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

button {
    width: 100%;
    padding: 10px;
    background: green;
    color: white;
    border: none;
    margin-top: 10px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<h1>Calculator Hubs</h1>
<p>All-in-one free calculators</p>
</div>

<!-- CALCULATOR MENU -->
<div class="grid">
<div class="card" onclick="show('currency')">💱 Currency Converter</div>
<div class="card" onclick="show('bmi')">⚖️ BMI Calculator</div>
<div class="card" onclick="show('age')">🎂 Age Calculator</div>
</div>

<!-- CURRENCY -->
<div id="currency" class="calculator">
<h2>Currency Converter</h2>

<input type="number" id="amount" value="1">
<select id="from"></select>
<select id="to"></select>

<button onclick="convert()">Convert</button>
<h3 id="result"></h3>

<button onclick="back()">⬅ Back</button>
</div>

<!-- BMI -->
<div id="bmi" class="calculator">
<h2>BMI Calculator</h2>

<input type="number" id="weight" placeholder="Weight (kg)">
<input type="number" id="height" placeholder="Height (cm)">

<button onclick="calcBMI()">Calculate</button>
<h3 id="bmiResult"></h3>

<button onclick="back()">⬅ Back</button>
</div>

<!-- AGE -->
<div id="age" class="calculator">
<h2>Age Calculator</h2>

<input type="date" id="dob">

<button onclick="calcAge()">Calculate</button>
<h3 id="ageResult"></h3>

<button onclick="back()">⬅ Back</button>
</div>

<script>
let rates = {};

async function load() {
let res = await fetch("https://api.exchangerate-api.com/v4/latest/USD");
let data = await res.json();
rates = data.rates;

for (let c in rates) {
from.add(new Option(c,c));
to.add(new Option(c,c));
}
from.value="USD";
to.value="INR";
}

// SHOW CALCULATOR
function show(id){
document.querySelector('.grid').style.display="none";
document.getElementById(id).style.display="block";
}

// BACK
function back(){
document.querySelector('.grid').style.display="grid";
document.querySelectorAll('.calculator').forEach(c=>c.style.display="none");
}

// CURRENCY
function convert(){
let amt = amount.value;
let rate = rates[to.value]/rates[from.value];
let result = amt * rate;
document.getElementById("result").innerText =
amt+" "+from.value+" = "+result.toFixed(2)+" "+to.value;
}

// BMI
function calcBMI(){
let w = weight.value;
let h = height.value/100;
let b = w/(h*h);
bmiResult.innerText = "BMI: "+b.toFixed(2);
}

// AGE
function calcAge(){
let dob = new Date(document.getElementById("dob").value);
let today = new Date();
let age = today.getFullYear() - dob.getFullYear();
ageResult.innerText = "Age: "+age+" years";
}

load();
</script>

</body>
</html>
