<!DOCTYPE html>
<html>
<head>
    <title>Calculator Hubs</title>

    <!-- Adsense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2088931413685380"
     crossorigin="anonymous"></script>

    <!-- Google Verification -->
    <meta name="google-site-verification" content="XtRP8dWNNcBkmDLcIO1_ytufZYWCKEL6qcLK8GnwCdk" />

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            padding-top: 50px;
        }

        .box {
            background: white;
            padding: 20px;
            width: 320px;
            margin: auto;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        h2 {
            background: #00c853;
            padding: 12px;
            border-radius: 6px;
            color: white;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: none;
            background: green;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: darkgreen;
        }

        #history {
            text-align: left;
            list-style: none;
            padding: 0;
        }

        #history li {
            background: #f2f2f2;
            margin: 5px 0;
            padding: 8px;
            border-radius: 5px;
        }

        footer {
            margin-top: 30px;
        }

        footer a {
            margin: 0 10px;
            text-decoration: none;
            color: blue;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Currency Converter 🔥</h2>

    <input type="number" id="amount" placeholder="Enter amount">

    <select id="from"></select>
    <select id="to"></select>

    <button onclick="convert()">Convert</button>

    <h3 id="result"></h3>

    <h3>History</h3>
    <ul id="history"></ul>

    <button onclick="clearHistory()">Clear History</button>
</div>

<footer>
    <a href="#">About</a> |
    <a href="#">Privacy</a> |
    <a href="#">Contact</a>
</footer>

<script>
let rates = {};

// Load currencies
async function loadCurrencies() {
    let res = await fetch("https://api.exchangerate-api.com/v4/latest/USD");
    let data = await res.json();

    rates = data.rates;

    let from = document.getElementById("from");
    let to = document.getElementById("to");

    for (let key in rates) {
        let opt1 = document.createElement("option");
        let opt2 = document.createElement("option");

        opt1.value = key;
        opt1.text = key;

        opt2.value = key;
        opt2.text = key;

        from.appendChild(opt1);
        to.appendChild(opt2);
    }

    from.value = "USD";
    to.value = "INR";
}

// Convert
function convert() {
    let amt = document.getElementById("amount").value;
    let from = document.getElementById("from").value;
    let to = document.getElementById("to").value;

    if (amt === "" || amt <= 0) {
        alert("Enter valid amount");
        return;
    }

    let result = (amt / rates[from]) * rates[to];
    let output = amt + " " + from + " = " + result.toFixed(2) + " " + to;

    document.getElementById("result").innerText = output;

    saveHistory(output);
}

// Save history
function saveHistory(text) {
    let history = JSON.parse(localStorage.getItem("history")) || [];
    history.push(text);
    localStorage.setItem("history", JSON.stringify(history));
    displayHistory();
}

// Show history
function displayHistory() {
    let history = JSON.parse(localStorage.getItem("history")) || [];
    let list = document.getElementById("history");

    list.innerHTML = "";

    history.slice(-5).reverse().forEach(item => {
        let li = document.createElement("li");
        li.innerText = item;
        list.appendChild(li);
    });
}

// Clear history
function clearHistory() {
    localStorage.removeItem("history");
    displayHistory();
}

// Load everything
window.onload = function() {
    loadCurrencies();
    displayHistory();
};
</script>

</body>
</html>
