<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f4f4;
padding:20px;
}
.container{
max-width:700px;
margin:auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.2);
}
h1{
text-align:center;
}
input[type=number]{
width:80px;
padding:8px;
}
label{
display:block;
margin:10px 0;
}
button{
padding:10px 18px;
margin-top:10px;
border:none;
background:#007bff;
color:white;
border-radius:5px;
cursor:pointer;
}
button:hover{
background:#0056b3;
}
#password{
width:100%;
padding:12px;
font-size:16px;
margin-top:15px;
}
</style>
</head>
<body>

<div class="container">

<h1>Password Generator</h1>

<label>
Length:
<input type="number" id="length" min="4" max="64" value="12">
</label>

<label><input type="checkbox" id="uppercase" checked> Uppercase (A-Z)</label>

<label><input type="checkbox" id="lowercase" checked> Lowercase (a-z)</label>

<label><input type="checkbox" id="numbers" checked> Numbers (0-9)</label>

<label><input type="checkbox" id="symbols" checked> Symbols (!@#$%)</label>

<button onclick="generatePassword()">Generate Password</button>

<input type="text" id="password" readonly>

<button onclick="copyPassword()">Copy Password</button>

</div>

<script>
function generatePassword(){

let upper="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
let lower="abcdefghijklmnopqrstuvwxyz";
let nums="0123456789";
let symbols="!@#$%^&*()_+-=[]{}<>?";

let chars="";

if(document.getElementById("uppercase").checked) chars+=upper;
if(document.getElementById("lowercase").checked) chars+=lower;
if(document.getElementById("numbers").checked) chars+=nums;
if(document.getElementById("symbols").checked) chars+=symbols;

let length=document.getElementById("length").value;

let password="";

for(let i=0;i<length;i++){
password+=chars.charAt(Math.floor(Math.random()*chars.length));
}

document.getElementById("password").value=password;
}

function copyPassword(){
let pass=document.getElementById("password");
pass.select();
document.execCommand("copy");
alert("Password Copied!");
}

generatePassword();
</script>

</body>
</html>
