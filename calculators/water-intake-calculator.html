<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water Intake Calculator | CalculatorHubs</title>
<link rel="stylesheet" href="../style.css">

<style>
.container{
max-width:600px;
margin:40px auto;
padding:20px;
background:#fff;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.15);
}
input,button{
width:100%;
padding:12px;
margin:10px 0;
font-size:16px;
}
button{
background:#0b7a2f;
color:#fff;
border:none;
cursor:pointer;
border-radius:5px;
}
button:hover{
background:#095f25;
}
#result{
margin-top:20px;
font-size:20px;
font-weight:bold;
text-align:center;
}
</style>
</head>

<body>

<header>
<h1>CalculatorHubs</h1>
<nav>
<a href="../index.html">Home</a>
</nav>
</header>

<div class="container">

<h2>Water Intake Calculator</h2>

<input type="number" id="weight" placeholder="Enter Your Weight (kg)">

<button onclick="calculateWater()">Calculate</button>

<div id="result"></div>

</div>

<script>
function calculateWater(){

let weight=parseFloat(document.getElementById("weight").value);

if(isNaN(weight)||weight<=0){
alert("Please enter a valid weight.");
return;
}

let water=weight*35;

document.getElementById("result").innerHTML=
`
<p>Recommended Daily Water Intake</p>
<h3>${water.toFixed(0)} ml</h3>
<p>≈ ${(water/1000).toFixed(2)} Liters per day</p>
`;

}
</script>

</body>
</html>
