<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Length Converter | CalculatorHubs.site</title>

<meta name="description"
content="Free Length Converter to convert meters, kilometers, centimeters, millimeters, inches, feet, yards and miles instantly.">

<link rel="stylesheet" href="../style.css">

<style>

.calculator{
max-width:700px;
margin:40px auto;
background:#fff;
padding:30px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.calculator input,
.calculator select{
width:100%;
padding:12px;
margin:12px 0;
font-size:17px;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:14px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.result{
margin-top:20px;
padding:20px;
background:#f3f4f6;
border-radius:10px;
font-size:22px;
font-weight:bold;
text-align:center;
}

.info{
max-width:900px;
margin:40px auto;
line-height:1.8;
}

</style>

</head>

<body>

<header>

<div class="container">

<h1>

<a href="../index.html">

CalculatorHubs.site

</a>

</h1>

</div>

</header>

<div class="calculator">

<h2>Length Converter</h2>

<p>Convert one length unit to another instantly.</p>

<input
type="number"
id="value"
placeholder="Enter Value">

<select id="from">

<option value="meter">Meter</option>
<option value="kilometer">Kilometer</option>
<option value="centimeter">Centimeter</option>
<option value="millimeter">Millimeter</option>
<option value="inch">Inch</option>
<option value="foot">Foot</option>
<option value="yard">Yard</option>
<option value="mile">Mile</option>

</select>

<select id="to">

<option value="meter">Meter</option>
<option value="kilometer">Kilometer</option>
<option value="centimeter">Centimeter</option>
<option value="millimeter">Millimeter</option>
<option value="inch">Inch</option>
<option value="foot">Foot</option>
<option value="yard">Yard</option>
<option value="mile">Mile</option>

</select>

<button onclick="convertLength()">

Convert

</button>

<div
class="result"
id="result">

Result will appear here.

</div>

</div>

<div class="info">

<h2>About Length Converter</h2>

<p>

This calculator converts between Meter, Kilometer, Centimeter,
Millimeter, Inch, Foot, Yard and Mile instantly.

</p>

</div>

<footer>

<p>

© 2026 CalculatorHubs.site

</p>

</footer>

<script>

function convertLength(){

let value=parseFloat(document.getElementById("value").value);

if(isNaN(value)){

document.getElementById("result").innerHTML="Please enter a valid value.";

return;

}

let from=document.getElementById("from").value;

let to=document.getElementById("to").value;

const meter={

meter:1,
kilometer:1000,
centimeter:0.01,
millimeter:0.001,
inch:0.0254,
foot:0.3048,
yard:0.9144,
mile:1609.344

};

let meters=value*meter[from];

let answer=meters/meter[to];

document.getElementById("result").innerHTML=

value+" "+from+" = <br><b>"+answer.toFixed(6)+" "+to+"</b>";

}

</script>

</body>

</html>
