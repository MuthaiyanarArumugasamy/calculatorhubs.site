<!DOCTYPE html>
<html>
<head>
<title>Water Bill Calculator</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(120deg,#89f7fe,#66a6ff);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    width:350px;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 15px gray;
}

h1{
    color:#333;
}

input{
    width:90%;
    padding:12px;
    margin:15px;
    border-radius:8px;
    border:1px solid gray;
}

button{
    background:#007bff;
    color:white;
    padding:12px 25px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

#result{
    margin-top:20px;
    color:green;
    font-size:20px;
}
</style>

</head>

<body>

<div class="container">

<h1>Water Bill Calculator</h1>

<input type="number" id="litres" placeholder="Enter Water Usage (Litres)">

<button onclick="calculateWaterBill()">Calculate</button>

<div id="result"></div>

</div>


<script>

function calculateWaterBill(){

    let litres = Number(document.getElementById("litres").value);
    let bill = 0;

    if(litres <= 5000){
        bill = litres * 0.005;
    }
    else if(litres <= 10000){
        bill = (5000 * 0.005) + ((litres-5000) * 0.01);
    }
    else if(litres <= 20000){
        bill = (5000 * 0.005) + (5000 * 0.01) + ((litres-10000) * 0.015);
    }
    else{
        bill = (5000 * 0.005) + (5000 * 0.01) + (10000 * 0.015) + ((litres-20000) * 0.02);
    }

    let serviceCharge = 50;

    let total = bill + serviceCharge;

    document.getElementById("result").innerHTML =
    "Water Bill = ₹ " + total.toFixed(2);

}

</script>

</body>
</html>
