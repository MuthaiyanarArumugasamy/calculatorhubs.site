<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pythagorean Calculator | CalculatorHubs</title>

<link rel="stylesheet" href="../style.css">

<style>
body{
font-family:Arial,sans-serif;
background:#f5f7fb;
margin:0;
padding:0;
}

.container{
max-width:600px;
margin:60px auto;
background:#fff;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#2563eb;
margin-bottom:20px;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input{
width:100%;
padding:12px;
margin-top:8px;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
margin-top:20px;
background:#2563eb;
color:#fff;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

#result{
margin-top:20px;
padding:15px;
background:#eef6ff;
border-radius:10px;
font-size:20px;
font-weight:bold;
text-align:center;
}
</style>

</head>

<body>

<div class="container">

<h1>Pythagorean Calculator</h1>

<label>Side A</label>
<input type="number" id="a">

<label>Side B</label>
<input type="number" id="b">

<button onclick="calculate()">Calculate Hypotenuse</button>

<div id="result"></div>

</div>

<script>

function calculate(){

let a=parseFloat(document.getElementById("a").value);
let b=parseFloat(document.getElementById("b").value);

if(isNaN(a)||isNaN(b)||a<=0||b<=0){

document.getElementById("result").innerHTML="Enter valid positive values.";
return;

}

let c=Math.sqrt((a*a)+(b*b));

document.getElementById("result").innerHTML=
"Hypotenuse (C) = "+c.toFixed(2);

}

</script>

</body>
</html>
