<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Currency Converter | CalculatorHubs</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<header>
<h1>CalculatorHubs</h1>
<nav>
<a href="../index.html">Home</a>
</nav>
</header>

<section class="hero">

<h2>Currency Converter</h2>

<p>Convert currencies using a simple exchange rate.</p>

<input type="number" id="amount" placeholder="Amount"><br><br>

<input type="number" id="rate" placeholder="Exchange Rate"><br><br>

<button onclick="convertCurrency()">Convert</button>

<h3 id="result"></h3>

</section>

<section class="content">

<h2>About Currency Converter</h2>

<p>
This calculator converts an amount using the exchange rate you enter. Enter the amount and the exchange rate to calculate the converted value.
</p>

</section>

<footer>
<p>© 2026 CalculatorHubs</p>
</footer>

<script>

function convertCurrency(){

let amount=parseFloat(document.getElementById("amount").value);
let rate=parseFloat(document.getElementById("rate").value);

if(!amount || !rate){
alert("Please fill all fields");
return;
}

let converted=amount*rate;

document.getElementById("result").innerHTML=
"Converted Amount: "+converted.toFixed(2);

}

</script>

</body>
</html>
