<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Formatter</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f4f4;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

h1{
text-align:center;
}

textarea{
width:100%;
height:250px;
padding:10px;
font-size:15px;
border:1px solid #ccc;
border-radius:5px;
resize:vertical;
}

button{
padding:12px 18px;
margin:10px 5px;
font-size:16px;
cursor:pointer;
border:none;
border-radius:5px;
background:#007bff;
color:white;
}

button:hover{
background:#0056b3;
}

#output{
margin-top:20px;
background:#272822;
color:#00ff7f;
padding:15px;
white-space:pre-wrap;
border-radius:5px;
min-height:200px;
overflow:auto;
}

.error{
color:red;
font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

<h1>JSON Formatter & Validator</h1>

<textarea id="jsonInput" placeholder="Paste JSON here..."></textarea>

<br>

<button onclick="formatJSON()">Format JSON</button>

<button onclick="minifyJSON()">Minify</button>

<button onclick="clearAll()">Clear</button>

<div id="output"></div>

</div>

<script>

function formatJSON(){

let input=document.getElementById("jsonInput").value;

try{

let obj=JSON.parse(input);

document.getElementById("output").textContent=
JSON.stringify(obj,null,4);

}
catch(err){

document.getElementById("output").innerHTML=
"<span class='error'>Invalid JSON!</span>";

}

}

function minifyJSON(){

let input=document.getElementById("jsonInput").value;

try{

let obj=JSON.parse(input);

document.getElementById("output").textContent=
JSON.stringify(obj);

}
catch(err){

document.getElementById("output").innerHTML=
"<span class='error'>Invalid JSON!</span>";

}

}

function clearAll(){

document.getElementById("jsonInput").value="";
document.getElementById("output").textContent="";

}

</script>

</body>
</html>
