<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loan Eligibility Calculator | CalculatorHubs</title>

<link rel="stylesheet" href="../style.css">

<style>
body{
font-family:Arial,sans-serif;
background:#f5f7fb;
margin:0;
padding:0;
}

.container{
max-width:600px;
margin:60px auto;
background:#fff;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#2563eb;
margin-bottom:25px;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input{
width:100%;
padding:12px;
margin-top:8px;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
margin-top:20px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

#result{
margin-top:20px;
padding:15px;
background:#eef6ff;
border-radius:10px;
font-size:20px;
font-weight:bold;
text-align:center;
}
</style>

</head>

<body>

<div class="container">

<h1>Loan Eligibility Calculator</h1>

<label>Monthly Income (₹)</label>
<input type="number" id="income">

<label>Existing Monthly EMI (₹)</label>
<input type="number" id="emi">

<button onclick="calculateEligibility()">Calculate</button>

<div id="result"></div>

</div>

<script>

function calculateEligibility(){

let income=parseFloat(document.getElementById("income").value);

let emi=parseFloat(document.getElementById("emi").value);

if(isNaN(income)||isNaN(emi)){

document.getElementById("result").innerHTML="Enter all values.";

return;

}

let eligible=(income*0.5-emi)*60;

if(eligible<0) eligible=0;

document.getElementById("result").innerHTML="Eligible Loan Amount<br>₹"+eligible.toLocaleString("en-IN",{maximumFractionDigits:2});

}

</script>

</body>
</html>
