<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discount Calculator | CalculatorHubs</title>
<link rel="stylesheet" href="../style.css">

<style>
.container{
max-width:600px;
margin:40px auto;
padding:20px;
background:#fff;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.15);
}

input,button{
width:100%;
padding:12px;
margin:10px 0;
font-size:16px;
}

button{
background:#0b7a2f;
color:#fff;
border:none;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#095f25;
}

#result{
margin-top:20px;
font-size:20px;
font-weight:bold;
text-align:center;
}
</style>
</head>

<body>

<header>
<h1>CalculatorHubs</h1>
<nav>
<a href="../index.html">Home</a>
</nav>
</header>

<div class="container">
<h2>Discount Calculator</h2>

<input type="number" id="price" placeholder="Original Price">

<input type="number" id="discount" placeholder="Discount (%)">

<button onclick="calculateDiscount()">Calculate</button>

<div id="result"></div>
</div>

<script>
function calculateDiscount(){

let price=parseFloat(document.getElementById("price").value);
let discount=parseFloat(document.getElementById("discount").value);

if(isNaN(price)||isNaN(discount)){
alert("Please enter valid values");
return;
}

let discountAmount=(price*discount)/100;
let finalPrice=price-discountAmount;

document.getElementById("result").innerHTML=
`
<p>Discount Amount: ₹${discountAmount.toFixed(2)}</p>
<p>Final Price: ₹${finalPrice.toFixed(2)}</p>
`;
}
</script>

</body>
</html>
