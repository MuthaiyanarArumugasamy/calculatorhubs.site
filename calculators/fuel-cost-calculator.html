<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuel Cost Calculator | CalculatorHubs</title>
<link rel="stylesheet" href="../style.css">

<style>
.container{
max-width:600px;
margin:40px auto;
padding:20px;
background:#fff;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.15);
}
input,button{
width:100%;
padding:12px;
margin:10px 0;
font-size:16px;
}
button{
background:#0b7a2f;
color:#fff;
border:none;
border-radius:5px;
cursor:pointer;
}
button:hover{
background:#095f25;
}
#result{
margin-top:20px;
font-size:20px;
font-weight:bold;
text-align:center;
}
</style>
</head>

<body>

<header>
<h1>CalculatorHubs</h1>
<nav>
<a href="../index.html">Home</a>
</nav>
</header>

<div class="container">

<h2>Fuel Cost Calculator</h2>

<input type="number" id="distance" placeholder="Distance (km)">
<input type="number" id="mileage" placeholder="Vehicle Mileage (km/L)">
<input type="number" id="price" placeholder="Fuel Price per Liter">

<button onclick="calculateFuel()">Calculate</button>

<div id="result"></div>

</div>

<script>
function calculateFuel(){

const distance = parseFloat(document.getElementById("distance").value);
const mileage = parseFloat(document.getElementById("mileage").value);
const price = parseFloat(document.getElementById("price").value);

if(isNaN(distance) || isNaN(mileage) || isNaN(price) || mileage<=0){
alert("Please enter valid values.");
return;
}

const liters = distance / mileage;
const totalCost = liters * price;

document.getElementById("result").innerHTML =
`
<p>Fuel Required: ${liters.toFixed(2)} Liters</p>
<p>Total Fuel Cost: ₹${totalCost.toFixed(2)}</p>
`;

}
</script>

</body>
</html>
