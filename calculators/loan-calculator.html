<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Calculator | CalculatorHubs</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<header>
<h1>CalculatorHubs</h1>
<nav>
<a href="../index.html">Home</a>
</nav>
</header>

<section class="hero">

<h2>Loan Calculator</h2>

<p>Estimate the total repayment amount for your loan.</p>

<input type="number" id="loanAmount" placeholder="Loan Amount (₹)"><br><br>

<input type="number" id="interestRate" placeholder="Annual Interest Rate (%)"><br><br>

<input type="number" id="loanYears" placeholder="Loan Period (Years)"><br><br>

<button onclick="calculateLoan()">Calculate</button>

<h3 id="result"></h3>

</section>

<section class="content">

<h2>About Loan Calculator</h2>

<p>
Use this calculator to estimate the total amount you will repay on a loan based on the loan amount, annual interest rate, and repayment period.
</p>

</section>

<footer>
<p>© 2026 CalculatorHubs</p>
</footer>

<script>

function calculateLoan(){

let amount=parseFloat(document.getElementById("loanAmount").value);
let rate=parseFloat(document.getElementById("interestRate").value);
let years=parseFloat(document.getElementById("loanYears").value);

if(!amount || !rate || !years){
alert("Please fill all fields");
return;
}

let total = amount + (amount * rate * years / 100);

document.getElementById("result").innerHTML =
"Estimated Total Repayment: ₹" + total.toFixed(2);

}

</script>

</body>
</html>
