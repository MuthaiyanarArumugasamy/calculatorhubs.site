<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paint Calculator | CalculatorHubs</title>
<link rel="stylesheet" href="../style.css">

<style>
.container{
max-width:600px;
margin:40px auto;
padding:20px;
background:#fff;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.15);
}
input,button{
width:100%;
padding:12px;
margin:10px 0;
font-size:16px;
}
button{
background:#0b7a2f;
color:#fff;
border:none;
border-radius:5px;
cursor:pointer;
}
button:hover{
background:#095f25;
}
#result{
margin-top:20px;
font-size:20px;
font-weight:bold;
text-align:center;
}
</style>
</head>

<body>

<header>
<h1>CalculatorHubs</h1>
<nav>
<a href="../index.html">Home</a>
</nav>
</header>

<div class="container">

<h2>Paint Calculator</h2>

<input type="number" id="length" placeholder="Wall Length (meters)">
<input type="number" id="height" placeholder="Wall Height (meters)">

<button onclick="calculatePaint()">Calculate</button>

<div id="result"></div>

</div>

<script>
function calculatePaint(){

const length = parseFloat(document.getElementById("length").value);
const height = parseFloat(document.getElementById("height").value);

if(isNaN(length) || isNaN(height)){
alert("Please enter valid values.");
return;
}

const area = length * height;
const liters = area / 10;

document.getElementById("result").innerHTML =
`
<p>Wall Area: ${area.toFixed(2)} m²</p>
<p>Estimated Paint Required: ${liters.toFixed(2)} Liters</p>
`;

}
</script>

</body>
</html>
